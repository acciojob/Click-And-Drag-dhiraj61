<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Click and Drag</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="items">
    <div  class="item item1">01</div>
    <div  class="item item2">02</div>
    <div  class="item item3">03</div>
    <div  class="item item4">04</div>
    <div  class="item item5">05</div>
    <div  class="item item6">06</div>
    <div  class="item item7">07</div>
    <div  class="item item8">08</div>
    <div  class="item item9">09</div>
    <div  class="item item10">10</div>
    <div  class="item item11">11</div>
    <div  class="item item12">12</div>
    <div  class="item item13">13</div>
    <div  class="item item14">14</div>
    <div  class="item item15">15</div>
    <div  class="item item16">16</div>
    <div  class="item item17">17</div>
    <div  class="item item18">18</div>
    <div  class="item item19">19</div>
    <div  class="item item20">20</div>
    <div  class="item item21">21</div>
    <div  class="item item22">22</div>
    <div  class="item item23">23</div>
    <div  class="item item24">24</div>
    <div  class="item item25">25</div>
  </div>

<script>
//Your code goes here 
const container = document.querySelector(".items");
const cubes = document.querySelectorAll(".item");

let current = null;
let shiftX = 0;
let shiftY = 0;

cubes.forEach(cube => {
    cube.addEventListener("mousedown", startDrag);
});

function startDrag(e) {
    current = e.target;

    const cubeRect = current.getBoundingClientRect();

    shiftX = e.clientX - cubeRect.left;
    shiftY = e.clientY - cubeRect.top;

    current.style.position = "absolute";
    current.style.zIndex = "1000";

    document.addEventListener("mousemove", moveCube);
    document.addEventListener("mouseup", stopDrag);

    e.preventDefault();
}

function moveCube(e) {
    if (!current) return;

    const containerRect = container.getBoundingClientRect();

    let left = e.clientX - containerRect.left - shiftX;
    let top = e.clientY - containerRect.top - shiftY;

    // Keep cube inside container
    left = Math.max(
        0,
        Math.min(left, container.clientWidth - current.offsetWidth)
    );

    top = Math.max(
        0,
        Math.min(top, container.clientHeight - current.offsetHeight)
    );

    current.style.left = left + "px";
    current.style.top = top + "px";
}

function stopDrag() {
    document.removeEventListener("mousemove", moveCube);
    document.removeEventListener("mouseup", stopDrag);

    current = null;
}
</script>
  
  </body>
</html>
