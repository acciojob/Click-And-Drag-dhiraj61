<script>
//Your code goes here 
// Your code here.
  function drag(event){
    let draggable = document.querySelector(`.${event.target.classList[1]}`)
    const shiftX = event.clientX - draggable.getBoundingClientRect().left;
    const shiftY = event.clientY - draggable.getBoundingClientRect().top;

    draggable.style.position = "absolute";
    draggable.style.zIndex = "1000";

    function moveAt(pageX, pageY) {
        draggable.style.left = pageX - shiftX + "px";
        draggable.style.top = pageY - shiftY + "px";
    }

    moveAt(event.pageX, event.pageY);

    function onMouseMove(e) {
        moveAt(e.pageX, e.pageY);
    }

    document.addEventListener("mousemove", onMouseMove);

    document.addEventListener("mouseup", function stopDrag() {
        document.removeEventListener("mousemove", onMouseMove);
        document.removeEventListener("mouseup", stopDrag);
    });

    draggable.ondragstart = () => false;
};
</script>
